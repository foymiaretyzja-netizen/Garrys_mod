<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod Menu</title>
    <style>
        /* --- FONT & RESET --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            /* Using Helvetica/Arial Bold to match your screenshot */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND LAYERS --- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 2s ease-in-out;
        }

        .bg-layer.active {
            opacity: 1;
            animation: gmodZoom 10s linear forwards;
        }

        @keyframes gmodZoom {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* --- UI OVERLAY --- */
        #ui-wrapper {
            position: relative;
            z-index: 10;
            padding: 40px 50px;
        }

        .logo {
            width: 160px; /* Smaller as requested */
            margin-bottom: 20px;
            display: block;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 0px; /* Tight spacing like Gmod */
        }

        .menu-item {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 700; /* Bold */
            text-decoration: none;
            cursor: pointer;
            letter-spacing: -1px; /* Tighter letters like your screenshot */
            line-height: 1.2;
            /* Pure black undershadow */
            text-shadow: 2px 2px 0px #000000;
            user-select: none;
            transition: color 0.05s;
        }

        /* Spacing groups like the screenshot */
        .group-space { margin-top: 25px; }

        .menu-item:hover, .menu-item:active {
            color: #FFFF00; /* Yellow highlight */
        }
    </style>
</head>
<body>

    <div id="bg-1" class="bg-layer active"></div>
    <div id="bg-2" class="bg-layer"></div>

    <div id="ui-wrapper">
        <img src="GmodLOGO.png" alt="" class="logo">
        
        <div class="menu-container">
            <a class="menu-item">Start New Game</a>
            <a class="menu-item">Find Multiplayer Game</a>
            
            <div class="group-space"></div>
            
            <a class="menu-item">Addons</a>
            <a class="menu-item">Dupes</a>
            <a class="menu-item">Saves</a>
            <a class="menu-item">Demos</a>
            
            <div class="group-space"></div>
            
            <a class="menu-item">Options</a>
            
            <div class="group-space"></div>
            
            <a class="menu-item">Quit</a>
        </div>
    </div>

    <script>
        // --- DATA SETUP ---
        const pngFiles = [2, 10, 12, 13, 15, 20, 21, 22, 23, 26, 30, 31, 33, 36, 45, 46, 47, 49, 50, 52];
        
        // Audio
        const hoverSnd = new Audio('ui_hover.wav');
        const clickSnd = new Audio('ui_click.wav');

        // --- BACKGROUND LOGIC ---
        let currentIdx = 1;
        
        function getImgPath() {
            // Random number between 2 and 52 (adjust if you have 1.jpg)
            const num = Math.floor(Math.random() * 51) + 2;
            const ext = pngFiles.includes(num) ? 'png' : 'jpg';
            return `${num}.${ext}`;
        }

        function swapBackground() {
            const nextIdx = currentIdx === 1 ? 2 : 1;
            const currentEl = document.getElementById(`bg-${currentIdx}`);
            const nextEl = document.getElementById(`bg-${nextIdx}`);
            
            const newImg = getImgPath();
            console.log("Loading Background:", newImg); // Check your browser console (F12) to see if it's finding the file

            nextEl.style.backgroundImage = `url('${newImg}')`;
            
            // Reset Animation
            nextEl.style.animation = 'none';
            nextEl.offsetHeight; 
            nextEl.style.animation = null;

            // Fade
            nextEl.classList.add('active');
            currentEl.classList.remove('active');
            
            currentIdx = nextIdx;
        }

        // Click/Hover Logic
        document.querySelectorAll('.menu-item').forEach(item => {
            item.onmouseenter = () => { hoverSnd.currentTime = 0; hoverSnd.play().catch(()=>{}); };
            item.onclick = () => { clickSnd.currentTime = 0; clickSnd.play().catch(()=>{}); };
        });

        // Initialize and Start Loop
        window.onload = () => {
            document.getElementById('bg-1').style.backgroundImage = `url('${getImgPath()}')`;
            setInterval(swapBackground, 10000);
        };
    </script>
</body>
</html>
