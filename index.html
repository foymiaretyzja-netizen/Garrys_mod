

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod Menu</title>
    <style>
        /* --- FONT & RESET --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND LAYERS --- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 2s ease-in-out;
        }

        .bg-layer.active {
            opacity: 1;
            animation: gmodZoom 10s linear forwards;
        }

        @keyframes gmodZoom {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* --- UI OVERLAY --- */
        #ui-wrapper {
            position: relative;
            z-index: 10;
            padding: 60px 70px;
        }

        .logo {
            width: 240px; 
            margin-bottom: 25px;
            display: block;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-item {
            color: #FFFFFF;
            font-size: 22px; 
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            letter-spacing: -0.5px;
            line-height: 1.1;
            text-shadow: 2px 2px 0px #000000;
            user-select: none;
            transition: color 0.05s;
            width: fit-content;
        }

        .group-space { margin-top: 20px; }

        .menu-item:hover {
            color: #FFFF00;
        }
        
        /* --- OPTIONS POPUP (MODAL) --- */
        #options-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Dim background when open */
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        #options-img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: auto; /* Ensures image itself doesn't close the menu */
        }
    </style>
</head>
<body>

    <div id="bg-1" class="bg-layer active"></div>
    <div id="bg-2" class="bg-layer"></div>

    <div id="options-overlay" onclick="closeOptions()">
        <img src="options.png" id="options-img" onclick="event.stopPropagation()">
    </div>

    <div id="ui-wrapper">
        <img src="GmodLOGO.png" alt="" class="logo">
        
        <div class="menu-container">
            <a class="menu-item">Start New Game</a>
            <a class="menu-item">Find Multiplayer Game</a>
            
            <div class="group-space"></div>
            
            <a class="menu-item">Addons</a>
            <a class="menu-item">Dupes</a>
            <a class="menu-item">Saves</a>
            <a class="menu-item">Demos</a>
            
            <div class="group-space"></div>
            
            <a class="menu-item" onclick="openOptions()">Options</a>
            
            <div class="group-space"></div>
            
            <a class="menu-item" onclick="window.close()">Quit</a>
        </div>
    </div>

    <script>
        const pngFiles = [2, 10, 12, 13, 15, 20, 21, 22, 23, 26, 30, 31, 33, 36, 45, 46, 47, 49, 50, 52];
        const hoverSnd = new Audio('ui_hover.wav');
        const clickSnd = new Audio('ui_click.wav');

        // --- POPUP LOGIC ---
        function openOptions() {
            document.getElementById('options-overlay').style.display = 'flex';
        }

        function closeOptions() {
            document.getElementById('options-overlay').style.display = 'none';
        }

        // --- BACKGROUND LOGIC ---
        let currentIdx = 1;
        function getImgPath() {
            const num = Math.floor(Math.random() * 52) + 1;
            const ext = pngFiles.includes(num) ? 'png' : 'jpg';
            return `${num}.${ext}`;
        }

        function swapBackground() {
            const nextIdx = currentIdx === 1 ? 2 : 1;
            const currentEl = document.getElementById(`bg-${currentIdx}`);
            const nextEl = document.getElementById(`bg-${nextIdx}`);
            
            nextEl.style.backgroundImage = `url('${getImgPath()}')`;
            nextEl.style.animation = 'none';
            nextEl.offsetHeight; 
            nextEl.style.animation = null;

            nextEl.classList.add('active');
            currentEl.classList.remove('active');
            currentIdx = nextIdx;
        }

        // Sounds
        document.querySelectorAll('.menu-item').forEach(item => {
            item.onmouseenter = () => { hoverSnd.currentTime = 0; hoverSnd.play().catch(()=>{}); };
            item.onmousedown = () => { clickSnd.currentTime = 0; clickSnd.play().catch(()=>{}); };
        });

        window.onload = () => {
            document.getElementById('bg-1').style.backgroundImage = `url('${getImgPath()}')`;
            setInterval(swapBackground, 10000);
        };
    </script>
</body>
</html>
