<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            font-family: 'Roboto', sans-serif; /* Applied Roboto Regular */
            background-color: #000;
        }

        /* --- BACKGROUND ZOOM & FADE --- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: -1;
            transition: opacity 2s ease-in-out;
        }

        .bg-layer.active {
            opacity: 1;
            animation: zoomIn 10s linear forwards;
        }

        @keyframes zoomIn {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* --- UI ELEMENTS --- */
        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 180px; /* Made even smaller as requested */
            z-index: 10;
        }

        .menu-container {
            position: absolute;
            top: 130px; /* Positioned directly under the smaller logo */
            left: 35px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .menu-item {
            color: white;
            font-size: 18px; /* Slightly smaller text */
            font-weight: 400; /* Regular weight */
            text-decoration: none;
            cursor: pointer;
            text-transform: uppercase; /* Optional: gives it that classic menu feel */
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 0px #000000; /* Pure black undershadow */
            transition: color 0.1s ease-in-out;
        }

        .menu-item:hover, .menu-item:active {
            color: #ffff00; /* Yellow highlight */
        }
    </style>
</head>
<body>

    <div id="bg-layer-1" class="bg-layer active"></div>
    <div id="bg-layer-2" class="bg-layer"></div>

    <img src="GmodLOGO.png" alt="Logo" class="logo">

    <div class="menu-container">
        <a class="menu-item">Start New Game</a>
        <a class="menu-item">Find Multiplayer Game</a>
        <a class="menu-item">Addons</a>
        <a class="menu-item) ">Settings</a>
        <a class="menu-item">Quit</a>
    </div>

    <script>
        // --- AUDIO CONFIG ---
        const hoverSound = new Audio('ui_hover.wav');
        const clickSound = new Audio('ui_click.wav');

        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                hoverSound.currentTime = 0;
                hoverSound.play().catch(() => {}); 
            });
            item.addEventListener('click', () => {
                clickSound.currentTime = 0;
                clickSound.play().catch(() => {});
            });
        });

        // --- DYNAMIC FILENAME HANDLER ---
        // This map tells the code which files are .png so it doesn't break
        const pngFiles = [10, 12, 13, 15, 2, 20, 21, 22, 23, 26, 30, 31, 33, 36, 45, 46, 47, 49, 50, 52];
        
        function getFileName(num) {
            const ext = pngFiles.includes(num) ? 'png' : 'jpg';
            return `${num}.${ext}`;
        }

        let currentLayer = 1;
        let usedNumbers = [];

        function changeBackground() {
            const nextLayerNum = currentLayer === 1 ? 2 : 1;
            const nextLayer = document.getElementById('bg-layer-' + nextLayerNum);
            const currentLayerEl = document.getElementById('bg-layer-' + currentLayer);

            // Pick a random number 2-52 (since you listed 2 as the lowest and 52 as highest)
            // or 1-52 if 1.jpg exists. I'll use a range based on your list.
            let randomNum;
            do {
                randomNum = Math.floor(Math.random() * 52) + 1;
            } while (randomNum === 8 || randomNum === 9); // Skipping 8 and 9 if they aren't in your list

            const fileName = getFileName(randomNum);
            
            nextLayer.style.backgroundImage = `url('${fileName}')`;
            nextLayer.style.animation = 'none';
            nextLayer.offsetHeight; 
            nextLayer.style.animation = null;

            nextLayer.classList.add('active');
            currentLayerEl.classList.remove('active');

            currentLayer = nextLayerNum;
        }

        // Initialize first background
        document.getElementById('bg-layer-1').style.backgroundImage = `url('${getFileName(Math.floor(Math.random() * 50) + 2)}')`;

        // Cycle every 10 seconds
        setInterval(changeBackground, 10000);
    </script>
</body>
</html>
