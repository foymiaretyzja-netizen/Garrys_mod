<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod Menu</title>
    <style>
        /* --- FONT & RESET --- */
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND LAYERS --- */
        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; z-index: 1; transition: opacity 2s ease-in-out;
        }
        .bg-layer.active { opacity: 1; animation: gmodZoom 10s linear forwards; }
        @keyframes gmodZoom { from { transform: scale(1); } to { transform: scale(1.08); } }

        /* --- MAIN UI --- */
        #ui-wrapper { position: relative; z-index: 10; padding: 60px 70px; }
        .logo { width: 240px; margin-bottom: 25px; display: block; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)); }
        .menu-container { display: flex; flex-direction: column; gap: 2px; }
        .menu-item {
            color: #FFFFFF; font-size: 22px; font-weight: 700;
            text-decoration: none; cursor: pointer; letter-spacing: -0.5px;
            line-height: 1.1; text-shadow: 2px 2px 0px #000000;
            user-select: none; transition: color 0.05s; width: fit-content;
        }
        .menu-item:hover { color: #FFFF00; }
        .group-space { margin-top: 20px; }

        /* --- VERSION LABEL --- */
        .version-label {
            position: fixed; bottom: 15px; right: 20px;
            color: rgba(255, 255, 255, 0.6); font-size: 14px;
            font-weight: 700; text-shadow: 1px 1px 0px black; z-index: 10;
        }

        /* --- UNIVERSAL POPUP UI --- */
        #universal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 200;
            background: rgba(0, 0, 0, 0.7);
        }
        .window-frame {
            position: absolute; top: 5%; left: 5%; right: 5%; bottom: 5%;
            display: flex; flex-direction: column;
        }
        .window-title {
            color: white; font-size: 24px; font-weight: 700;
            text-shadow: 2px 2px 0px black; margin-bottom: 10px;
        }
        .window-body { display: flex; flex: 1; gap: 10px; }
        
        .sidebar { width: 200px; display: flex; flex-direction: column; gap: 5px; }
        .side-item {
            color: white; font-size: 14px; font-weight: 700;
            cursor: pointer; text-shadow: 1px 1px 0px black;
        }
        .side-item:hover, .side-item.active { color: #FFFF00; }

        .content-area {
            flex: 1; background: white; border: 1px solid #ccc;
            display: flex; justify-content: center; align-items: center;
            color: #666; font-size: 24px; font-weight: 700;
        }

        .back-btn {
            position: absolute; bottom: 20px; right: 20px;
            color: white; font-size: 24px; font-weight: 700;
            text-shadow: 2px 2px 0px black; cursor: pointer;
        }
        .back-btn:hover { color: #FFFF00; }

        #options-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5);
            z-index: 300; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="bg-1" class="bg-layer active"></div>
    <div id="bg-2" class="bg-layer"></div>
    <div class="version-label">v2026.03.22</div>

    <div id="options-overlay" onclick="closeOptions()">
        <img src="options.png" style="max-width:90%;" onclick="event.stopPropagation()">
    </div>

    <div id="universal-overlay">
        <div class="window-frame">
            <div class="window-title" id="win-title">Title</div>
            <div class="window-body">
                <div class="sidebar" id="win-sidebar">
                    </div>
                <div class="content-area" id="win-content">
                    Loading...
                </div>
            </div>
            <div class="back-btn" onclick="closeWindow()">Back</div>
        </div>
    </div>

    <div id="ui-wrapper">
        <img src="GmodLOGO.png" alt="" class="logo">
        <div class="menu-container">
            <a class="menu-item">Start New Game</a>
            <a class="menu-item">Find Multiplayer Game</a>
            <div class="group-space"></div>
            <a class="menu-item" onclick="openWindow('Addons')">Addons</a>
            <a class="menu-item" onclick="openWindow('Dupes')">Dupes</a>
            <a class="menu-item" onclick="openWindow('Saves')">Saves</a>
            <a class="menu-item" onclick="openWindow('Demos')">Demos</a>
            <div class="group-space"></div>
            <a class="menu-item" onclick="openOptions()">Options</a>
            <div class="group-space"></div>
            <a class="menu-item" onclick="window.close()">Quit</a>
        </div>
    </div>

    <script>
        const pngFiles = [2, 10, 12, 13, 15, 20, 21, 22, 23, 26, 30, 31, 33, 36, 45, 46, 47, 49, 50, 52];
        const hoverSnd = new Audio('ui_hover.wav');
        const clickSnd = new Audio('ui_click.wav');

        // Sidebar content for each category
        const menuData = {
            'Addons': ['Subscribed', 'Trending', 'Top Rated', 'Latest'],
            'Dupes': ['My Dupes', 'Subscribed', 'Trending', 'Friends'],
            'Saves': ['My Saves', 'Subscribed', 'Popular', 'Friends'],
            'Demos': ['My Demos', 'Trending', 'Top Rated']
        };

        function openOptions() { document.getElementById('options-overlay').style.display = 'flex'; }
        function closeOptions() { document.getElementById('options-overlay').style.display = 'none'; }

        function openWindow(type) {
            const overlay = document.getElementById('universal-overlay');
            const title = document.getElementById('win-title');
            const sidebar = document.getElementById('win-sidebar');
            const content = document.getElementById('win-content');

            title.innerText = type;
            content.innerText = "Loading...";
            
            // Build Sidebar
            sidebar.innerHTML = '';
            menuData[type].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'side-item' + (index === 0 ? ' active' : '');
                div.innerText = item;
                // Add sounds to new items
                div.onmouseenter = () => { hoverSnd.currentTime = 0; hoverSnd.play(); };
                div.onmousedown = () => { clickSnd.currentTime = 0; clickSnd.play(); };
                sidebar.appendChild(div);
            });

            overlay.style.display = 'block';
            setTimeout(() => { content.innerText = `No ${type.toLowerCase()} found!`; }, 800);
        }

        function closeWindow() { document.getElementById('universal-overlay').style.display = 'none'; }

        // Background Logic
        let currentIdx = 1;
        function getImgPath() {
            const num = Math.floor(Math.random() * 52) + 1;
            const ext = pngFiles.includes(num) ? 'png' : 'jpg';
            return `${num}.${ext}`;
        }
        function swapBackground() {
            const nextIdx = currentIdx === 1 ? 2 : 1;
            const curEl = document.getElementById(`bg-${currentIdx}`);
            const nxtEl = document.getElementById(`bg-${nextIdx}`);
            nxtEl.style.backgroundImage = `url('${getImgPath()}')`;
            nxtEl.style.animation = 'none'; nxtEl.offsetHeight; nxtEl.style.animation = null;
            nxtEl.classList.add('active'); curEl.classList.remove('active');
            currentIdx = nextIdx;
        }

        // Apply sounds
        document.querySelectorAll('.menu-item, .back-btn').forEach(item => {
            item.onmouseenter = () => { hoverSnd.currentTime = 0; hoverSnd.play().catch(()=>{}); };
            item.onmousedown = () => { clickSnd.currentTime = 0; clickSnd.play().catch(()=>{}); };
        });

        window.onload = () => {
            document.getElementById('bg-1').style.backgroundImage = `url('${getImgPath()}')`;
            setInterval(swapBackground, 10000);
        };
    </script>
</body>
</html>
