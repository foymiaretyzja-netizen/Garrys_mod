<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod - gm_structure</title>
    <style>
        /* --- CORE STYLING --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Tahoma, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(to bottom, #4a90e2 0%, #a0cbf1 50%, #e0ecef 100%);
            user-select: none;
        }

        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; cursor: none; }

        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.5); border-radius: 50%;
            z-index: 10; pointer-events: none; display: block; /* Crosshair visible */
        }

        /* --- LOADING SCREEN OVERLAY --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #dce4eb 0%, #a4b2c1 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; 
        }
        .center-stage { display: flex; flex-direction: column; align-items: center; transform: translateY(-20px); }
        .gmod-logo { max-width: 350px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); margin-bottom: 25px; }

        .notepad-spinner {
            width: 32px; height: 32px; background-color: #ffda47;
            border: 1px solid #c9a826; border-radius: 2px; position: relative;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.15);
            animation: flipNotepad 1.8s infinite linear;
        }
        .eye { position: absolute; width: 5px; height: 5px; background: #333; border-radius: 50%; top: 8px; }
        .eye.left { left: 6px; } .eye.right { right: 6px; }
        .mouth { position: absolute; width: 14px; height: 3px; background: #333; bottom: 8px; left: 8px; border-radius: 0 0 10px 10px; }
        @keyframes flipNotepad { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }

        .loading-hud { position: absolute; bottom: 40px; right: 50px; display: flex; flex-direction: column; align-items: flex-end; }
        .status-text { color: #333; font-size: 13px; font-weight: bold; margin-bottom: 6px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .bar-container { display: flex; gap: 2px; padding: 2px; background-color: #666; width: 280px; height: 16px; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); }
        .bar-block { flex: 1; background-color: transparent; }
        .bar-block.filled { background-color: #f2f2f2; }

        /* --- HUDS & OVERLAYS (Minimal for gm_structure) --- */
        #health-hud, #ammo-hud, #target-hud { display: none; } /* No HUDs for this map */

        #notification-container { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 100; pointer-events: none; }
        .noti-box { background: rgba(0, 0, 0, 0.6); color: white; padding: 8px 12px; border-radius: 4px; font-size: 14px; font-weight: bold; opacity: 1; transition: opacity 0.5s ease; }

        /* --- PAUSE MENU --- */
        #pause-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: none; background: rgba(0,0,0,0.2); backdrop-filter: blur(2px); cursor: default; }
        .sidebar { position: absolute; top: 0; left: 0; width: 350px; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%); padding: 50px; box-sizing: border-box; display: flex; flex-direction: column; }
        .menu-items { display: flex; flex-direction: column; gap: 6px; margin-top: 20px;}
        .menu-btn { background: none; border: none; color: white; font-family: Tahoma, Arial, sans-serif; font-size: 18px; font-weight: bold; text-align: left; cursor: pointer; padding: 4px 8px; width: fit-content; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); transition: background 0.1s; }
        .menu-btn:hover { background: rgba(255,255,255,0.1); border-radius: 2px; }

        /* Custom intro message */
        #intro-message {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 25px; border-radius: 8px;
            font-size: 20px; text-align: center; max-width: 600px; line-height: 1.4;
            z-index: 999; opacity: 0; transition: opacity 1s ease-in-out;
            pointer-events: none; /* Allow clicks to pass through */
        }
        #intro-message.visible { opacity: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="crosshair"></div>

    <div id="loading-overlay">
        <div class="center-stage">
            <img src="Garry's_Mod_logo.svg.png" class="gmod-logo" alt="Garry's Mod">
            <div class="notepad-spinner"><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div></div>
        </div>
        <div class="loading-hud">
            <div class="status-text" id="status-text">Building Complex Structures...</div>
            <div class="bar-container" id="progress-bar"></div>
        </div>
    </div>

    <div id="pause-menu">
        <div class="sidebar">
            <img src="GmodLOGO.png" style="width: 250px; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.8));" alt="Gmod Logo">
            <div class="menu-items">
                <button class="menu-btn" id="btn-resume">Resume Game</button>
                <button class="menu-btn" id="btn-controls">Controls</button>
                <div style="height: 15px;"></div>
                <button class="menu-btn" id="btn-disconnect">Disconnect</button>
            </div>
        </div>
    </div>

    <div id="intro-message">
        This is a test for rendering detailed structures within the browser client. <br>
        You are limited but free to explore!
    </div>

    <div id="game-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let engineFrozen = false; 
        let isPaused = false;

        // --- LOADING LOGIC (10 SECONDS) ---
        const totalBlocks = 20; const progressBar = document.getElementById('progress-bar');
        for (let i = 0; i < totalBlocks; i++) { const block = document.createElement('div'); block.className = 'bar-block'; progressBar.appendChild(block); }
        const blocks = document.querySelectorAll('.bar-block'); let currentBlock = 0;

        const loadingInterval = setInterval(() => {
            if (currentBlock < totalBlocks) {
                blocks[currentBlock].classList.add('filled'); currentBlock++;
            } else {
                clearInterval(loadingInterval); document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
                
                // Show intro message
                const introMessage = document.getElementById('intro-message');
                introMessage.classList.add('visible');
                setTimeout(() => {
                    introMessage.classList.remove('visible');
                }, 7000); // Message disappears after 7 seconds
            }
        }, 500); 

        // --- 3D ENGINE, MOVEMENT, & PHYSICS VARIABLES ---
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isSprinting = false, isCrouching = false, canJump = false, jumpPressed = false;
        let isNoclipping = false; 
        
        let prevTime = performance.now();
        const velocity = new THREE.Vector3(); const direction = new THREE.Vector3();
        let playerBaseY = 0; let cameraOffset = 10; const gravity = 40.0; const jumpForce = 20.0;

        // Textures
        const textureLoader = new THREE.TextureLoader();
        const grassTexture = textureLoader.load('grass01.jpg');
        grassTexture.wrapS = THREE.RepeatWrapping; grassTexture.wrapT = THREE.RepeatWrapping;

        const brickTexture = textureLoader.load('6.jpeg');
        brickTexture.wrapS = THREE.RepeatWrapping; brickTexture.wrapT = THREE.RepeatWrapping;
        brickTexture.repeat.set(0.5, 0.5); // Adjust for smaller bricks on a standard wall segment

        const concreteTexture = textureLoader.load('100-concrete-bare-dirty-texture-seamless.jpg');
        concreteTexture.wrapS = THREE.RepeatWrapping; concreteTexture.wrapT = THREE.RepeatWrapping;
        concreteTexture.repeat.set(0.2, 0.2); // Adjust for larger concrete blocks


        init(); animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1); light.position.set(0, 200, 0); scene.add(light);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(0, 200, 100); scene.add(dirLight);

            // Floor
            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100); floorGeometry.rotateX(-Math.PI / 2);
            const floorMaterial = new THREE.MeshStandardMaterial({ map: grassTexture, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial); scene.add(floor);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            
            controls.addEventListener('unlock', function () {
                // Only pause menu opens, no spawn menu for this map
                pauseMenu.style.display = 'block'; isPaused = true; document.getElementById('crosshair').style.display = 'none'; 
            });

            controls.addEventListener('lock', function () {
                pauseMenu.style.display = 'none';
                isPaused = false;
                document.getElementById('crosshair').style.display = 'block';
            });

            document.addEventListener('mousedown', function (e) {
                if (!controls.isLocked) { if (!isPaused) controls.lock(); return; }
            });

            scene.add(controls.getObject());

            const onKeyDown = function (event) {
                if (isPaused) return; // Disable all movement and actions when paused

                if (event.code === 'Escape') { // Use escape for pause menu
                    if (controls.isLocked) controls.unlock();
                }

                if (event.code === 'KeyV') { // Toggle Noclip
                    isNoclipping = !isNoclipping; 
                    if(isNoclipping) velocity.set(0,0,0);
                    notify(`Noclip: ${isNoclipping ? 'ON' : 'OFF'}`);
                }

                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                    case 'Space': jumpPressed = true; if (canJump && !isNoclipping) { velocity.y += jumpForce; canJump = false; } break;
                    case 'ShiftLeft': isSprinting = true; break;
                    case 'ControlLeft': case 'KeyC': isCrouching = true; break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isSprinting = false; break;
                    case 'ControlLeft': case 'KeyC': isCrouching = false; break;
                    case 'Space': jumpPressed = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown); document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);

            // --- PAUSE MENU LOGIC ---
            document.getElementById('btn-resume').addEventListener('click', () => controls.lock());
            document.getElementById('btn-disconnect').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            document.getElementById('btn-controls').addEventListener('click', () => {
                alert("🕹️ CONTROLS:\n\nW, A, S, D - Move\nSpace - Jump\nShift - Sprint\nC / Ctrl - Crouch\nV - Toggle Noclip");
            });

            // --- BUILD STRUCTURES HERE ---
            createStructures();
        }

        function createStructures() {
            // Materials
            const brickMaterial = new THREE.MeshStandardMaterial({ map: brickTexture, roughness: 0.7, metalness: 0.1 });
            const concreteMaterial = new THREE.MeshStandardMaterial({ map: concreteTexture, roughness: 0.9, metalness: 0.05 });

            // Example structure 1: A simple brick wall
            const wall1 = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 1), brickMaterial);
            wall1.position.set(0, 5, -20);
            scene.add(wall1);

            // Example structure 2: Concrete pillar array
            for (let i = 0; i < 5; i++) {
                const pillar = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 15, 16), concreteMaterial);
                pillar.position.set(30, 7.5, -10 + (i * 10));
                scene.add(pillar);
            }

            // Example structure 3: A small concrete platform with brick steps
            const platform = new THREE.Mesh(new THREE.BoxGeometry(15, 2, 15), concreteMaterial);
            platform.position.set(-30, 1, 0);
            scene.add(platform);

            // Brick steps leading up to the platform
            for (let i = 0; i < 3; i++) {
                const step = new THREE.Mesh(new THREE.BoxGeometry(5, 1 + i*1.5, 3), brickMaterial);
                step.position.set(-30 + (i * 2.5), (0.5 + i*0.75), 10 - (i * 2));
                scene.add(step);
            }

            // Example structure 4: A large concrete "room" or open building frame
            const roomSize = 40;
            const roomHeight = 20;

            // Floor (part of the room, distinct from the ground floor)
            const roomFloor = new THREE.Mesh(new THREE.BoxGeometry(roomSize, 1, roomSize), concreteMaterial);
            roomFloor.position.set(80, 0.5, 0); // Slightly above ground
            scene.add(roomFloor);

            // Walls
            const wallFront = new THREE.Mesh(new THREE.BoxGeometry(roomSize, roomHeight, 1), concreteMaterial);
            wallFront.position.set(80, roomHeight / 2 + 1, roomSize / 2);
            scene.add(wallFront);

            const wallBack = new THREE.Mesh(new THREE.BoxGeometry(roomSize, roomHeight, 1), concreteMaterial);
            wallBack.position.set(80, roomHeight / 2 + 1, -roomSize / 2);
            scene.add(wallBack);

            const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(1, roomHeight, roomSize), concreteMaterial);
            wallLeft.position.set(80 - roomSize / 2, roomHeight / 2 + 1, 0);
            scene.add(wallLeft);

            const wallRight = new THREE.Mesh(new THREE.BoxGeometry(1, roomHeight, roomSize), concreteMaterial);
            wallRight.position.set(80 + roomSize / 2, roomHeight / 2 + 1, 0);
            scene.add(wallRight);

            // Additional brick details within the concrete room
            const innerWall = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 1), brickMaterial);
            innerWall.position.set(80, 5, 10);
            scene.add(innerWall);

            const innerPillar = new THREE.Mesh(new THREE.BoxGeometry(4, 12, 4), brickMaterial);
            innerPillar.position.set(70, 6, -15);
            scene.add(innerPillar);

            // You can continue adding more complex or abstract structures here!
            // Think about:
            // - Bridges
            // - Multi-level platforms
            // - Arches
            // - Tunnels/corridors
            // - Abstract sculptures
            // - Combining brick and concrete in interesting ways
        }

        function notify(text) {
            const notiContainer = document.getElementById('notification-container');
            const noti = document.createElement('div'); noti.className = 'noti-box'; noti.innerHTML = text; notiContainer.appendChild(noti);
            setTimeout(() => { noti.style.opacity = '0'; setTimeout(() => noti.remove(), 500); }, 3000);
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        function animate() {
            requestAnimationFrame(animate);
            if (engineFrozen) return; 

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); 
            
            if (controls.isLocked === true && !isPaused) {
                // Noclip movement
                if (isNoclipping) {
                    const noclipSpeed = isSprinting ? 500 : 200;
                    const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                    if (moveForward) controls.getObject().position.addScaledVector(camDir, noclipSpeed * delta);
                    if (moveBackward) controls.getObject().position.addScaledVector(camDir, -noclipSpeed * delta);
                    if (moveLeft) controls.moveRight(-noclipSpeed * delta);
                    if (moveRight) controls.moveRight(noclipSpeed * delta);
                    if (jumpPressed) controls.getObject().position.y += noclipSpeed * delta;
                    if (isCrouching) controls.getObject().position.y -= noclipSpeed * delta;
                    playerBaseY = controls.getObject().position.y - cameraOffset; velocity.set(0, 0, 0); 
                } 
                // Standard movement (with gravity and crouching/sprinting)
                else {
                    const friction = canJump ? 10.0 : 1.5; 
                    velocity.x -= velocity.x * friction * delta; velocity.z -= velocity.z * friction * delta; velocity.y -= gravity * delta;
                    direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft); direction.normalize(); 
                    let speed = 400.0; if (isCrouching) speed = 150.0; else if (isSprinting) speed = 750.0;
                    const controlMult = canJump ? 1.0 : 0.2; 
                    if (moveForward || moveBackward) velocity.z -= direction.z * speed * controlMult * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * speed * controlMult * delta;
                    controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);
                    
                    playerBaseY += velocity.y * delta;
                    if (playerBaseY < 0) { 
                        playerBaseY = 0;
                        velocity.y = 0; canJump = true;
                    }
                    const targetOffset = isCrouching ? 5 : 10;
                    cameraOffset += (targetOffset - cameraOffset) * 12 * delta; controls.getObject().position.y = playerBaseY + cameraOffset;
                }
            }
            prevTime = time; renderer.render(scene, camera);
        }
    </script>
</body>
</html>
