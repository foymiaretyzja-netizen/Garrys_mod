<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod - gm_baseplate</title>
    <style>
        /* --- CORE STYLING --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Tahoma, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(to bottom, #4a90e2 0%, #a0cbf1 50%, #e0ecef 100%);
            user-select: none;
        }

        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* --- CLICK TO PLAY OVERLAY (Hidden during loading) --- */
        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); display: none; /* Hidden at first */
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10;
        }
        #instructions {
            font-size: 24px; font-weight: bold; text-align: center; cursor: pointer;
            text-shadow: 2px 2px 0px #000;
        }

        /* --- LOADING SCREEN OVERLAY --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #dce4eb 0%, #a4b2c1 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; /* Keeps it on top of everything */
            transition: opacity 0.5s ease;
        }

        .center-stage { display: flex; flex-direction: column; align-items: center; transform: translateY(-20px); }
        .gmod-logo { max-width: 250px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); margin-bottom: 25px; }

        /* Spinning Notepad */
        .notepad-spinner {
            width: 32px; height: 32px; background-color: #ffda47;
            border: 1px solid #c9a826; border-radius: 2px; position: relative;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.15);
            animation: flipNotepad 1.8s infinite linear;
        }
        .eye { position: absolute; width: 5px; height: 5px; background: #333; border-radius: 50%; top: 8px; }
        .eye.left { left: 6px; }
        .eye.right { right: 6px; }
        .mouth { position: absolute; width: 14px; height: 3px; background: #333; bottom: 8px; left: 8px; border-radius: 0 0 10px 10px; }
        @keyframes flipNotepad { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }

        /* Loading Bar */
        .loading-hud { position: absolute; bottom: 40px; right: 50px; display: flex; flex-direction: column; align-items: flex-end; }
        .status-text { color: #333; font-size: 13px; font-weight: bold; margin-bottom: 6px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .bar-container { display: flex; gap: 2px; padding: 2px; background-color: #666; width: 280px; height: 16px; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); }
        .bar-block { flex: 1; background-color: transparent; }
        .bar-block.filled { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="center-stage">
            <img src="Garry's_Mod_logo.svg.png" class="gmod-logo" alt="Gmod Logo" onerror="this.alt='Logo Missing'; this.style.color='#000';">
            <div class="notepad-spinner">
                <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
            </div>
        </div>
        <div class="loading-hud">
            <div class="status-text" id="status-text">Beginning Lua...</div>
            <div class="bar-container" id="progress-bar"></div>
        </div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <span style="font-size:36px">Click to Spawn</span><br>
            <span style="font-size:16px; font-weight:normal; margin-top:10px; display:block;">
                (W, A, S, D = Move, MOUSE = Look around)<br>Press ESC to release mouse
            </span>
        </div>
    </div>

    <div id="game-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- LOADING SCREEN LOGIC ---
        const totalBlocks = 20;
        const progressBar = document.getElementById('progress-bar');
        
        for (let i = 0; i < totalBlocks; i++) {
            const block = document.createElement('div');
            block.className = 'bar-block';
            progressBar.appendChild(block);
        }

        const blocks = document.querySelectorAll('.bar-block');
        const statusText = document.getElementById('status-text');
        const totalTimeMs = 10000; // 10 seconds
        const intervalMs = totalTimeMs / totalBlocks; // 500ms per block
        let currentBlock = 0;

        const loadingInterval = setInterval(() => {
            if (currentBlock < totalBlocks) {
                blocks[currentBlock].classList.add('filled');
                currentBlock++;

                const progress = currentBlock / totalBlocks;
                if (progress > 0.3 && progress < 0.8) {
                    statusText.innerText = "Loading Lua...";
                } else if (progress >= 0.8) {
                    statusText.innerText = "Lua started...";
                }
            } else {
                clearInterval(loadingInterval);
                // Hide loading screen, show the "Click to spawn" blocker
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('blocker').style.display = 'flex';
                }, 500); // Wait for the fade out
            }
        }, intervalMs);

        // --- 3D ENGINE LOGIC ---
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10; 

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            light.position.set(0, 200, 0);
            scene.add(light);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 200, 100);
            scene.add(dirLight);

            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeometry.rotateX(-Math.PI / 2);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            scene.add(floor);

            const gridHelper = new THREE.GridHelper(2000, 200, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            gridHelper.position.y = 0.1; 
            scene.add(gridHelper);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');
            const instructions = document.getElementById('instructions');

            instructions.addEventListener('click', function () { controls.lock(); });
            controls.addEventListener('lock', function () { blocker.style.display = 'none'; });
            controls.addEventListener('unlock', function () { blocker.style.display = 'flex'; });
            scene.add(controls.getObject());

            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked === true) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                const speed = 400.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                prevTime = time;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
