<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod - gm_baseplate</title>
    <style>
        /* --- CORE STYLING --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: "Helvetica Neue", Arial, sans-serif;
            /* Unity-style skybox gradient */
            background: linear-gradient(to bottom, #4a90e2 0%, #a0cbf1 50%, #e0ecef 100%);
        }

        #game-canvas {
            display: block; width: 100%; height: 100%;
        }

        /* --- CLICK TO PLAY OVERLAY --- */
        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10;
        }
        #instructions {
            font-size: 24px; font-weight: bold; text-align: center; cursor: pointer;
            text-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <span style="font-size:36px">Click to Spawn</span><br>
            <span style="font-size:16px; font-weight:normal; margin-top:10px; display:block;">
                (W, A, S, D = Move, MOUSE = Look around)<br>
                Press ESC to release mouse
            </span>
        </div>
    </div>

    <div id="game-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        init();
        animate();

        function init() {
            // 1. Setup Scene
            scene = new THREE.Scene();
            
            // 2. Setup Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10; // Eye level

            // 3. Setup Lighting
            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            light.position.set(0, 200, 0);
            scene.add(light);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 200, 100);
            scene.add(dirLight);

            // 4. Setup The Baseplate & Grid
            // The solid floor (Roblox baseplate style)
            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeometry.rotateX(-Math.PI / 2);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            scene.add(floor);

            // The grid overlay
            const gridHelper = new THREE.GridHelper(2000, 200, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            gridHelper.position.y = 0.1; // Slightly above floor to prevent Z-fighting
            scene.add(gridHelper);

            // 5. Setup Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true allows CSS background to show
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            // 6. Setup Controls (First Person)
            controls = new THREE.PointerLockControls(camera, document.body);

            const blocker = document.getElementById('blocker');
            const instructions = document.getElementById('instructions');

            instructions.addEventListener('click', function () {
                controls.lock();
            });

            controls.addEventListener('lock', function () {
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
            });

            scene.add(controls.getObject());

            // 7. Setup Input Listeners
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = true; break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Add friction/damping to movement
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // Ensure consistent movement speed in all directions

                const speed = 400.0;

                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                prevTime = time;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
