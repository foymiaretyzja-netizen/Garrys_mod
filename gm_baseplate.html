<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod - gm_baseplate</title>
    <style>
        /* --- CORE STYLING --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Tahoma, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(to bottom, #4a90e2 0%, #a0cbf1 50%, #e0ecef 100%);
            user-select: none;
        }

        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; cursor: crosshair; }

        /* --- LOADING SCREEN OVERLAY --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #dce4eb 0%, #a4b2c1 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; 
        }

        .center-stage { display: flex; flex-direction: column; align-items: center; transform: translateY(-20px); }
        .gmod-logo { max-width: 250px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); margin-bottom: 25px; }

        .notepad-spinner {
            width: 32px; height: 32px; background-color: #ffda47;
            border: 1px solid #c9a826; border-radius: 2px; position: relative;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.15);
            animation: flipNotepad 1.8s infinite linear;
        }
        .eye { position: absolute; width: 5px; height: 5px; background: #333; border-radius: 50%; top: 8px; }
        .eye.left { left: 6px; } .eye.right { right: 6px; }
        .mouth { position: absolute; width: 14px; height: 3px; background: #333; bottom: 8px; left: 8px; border-radius: 0 0 10px 10px; }
        @keyframes flipNotepad { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }

        .loading-hud { position: absolute; bottom: 40px; right: 50px; display: flex; flex-direction: column; align-items: flex-end; }
        .status-text { color: #333; font-size: 13px; font-weight: bold; margin-bottom: 6px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .bar-container { display: flex; gap: 2px; padding: 2px; background-color: #666; width: 280px; height: 16px; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); }
        .bar-block { flex: 1; background-color: transparent; }
        .bar-block.filled { background-color: #f2f2f2; }

        /* --- 2D VIEWMODEL --- */
        @keyframes pulseGlow {
            0% { filter: drop-shadow(0px 0px 3px rgba(0, 150, 255, 0.15)); }
            50% { filter: drop-shadow(0px 0px 10px rgba(0, 150, 255, 0.4)); }
            100% { filter: drop-shadow(0px 0px 3px rgba(0, 150, 255, 0.15)); }
        }

        #viewmodel {
            position: absolute; 
            bottom: -50px; right: -50px; 
            width: 45%; max-width: 600px; 
            z-index: 5; pointer-events: none; 
            transform-origin: bottom right;
            display: none; 
            animation: pulseGlow 4s infinite ease-in-out;
        }

        /* --- GMOD HINTS SYSTEM --- */
        #hint-container {
            position: absolute; right: 20px; bottom: 30%; 
            display: flex; flex-direction: column; gap: 8px; z-index: 50;
            pointer-events: none; 
        }
        .gmod-hint {
            background: rgba(0, 0, 0, 0.65); color: white; font-size: 14px; font-weight: bold;
            padding: 6px 15px 6px 10px; display: flex; align-items: center; gap: 12px;
            text-shadow: 1px 1px 0px black; border-radius: 2px;
            opacity: 0; transform: translateY(20px) scale(0.95);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gmod-hint.show { opacity: 1; transform: translateY(0) scale(1); }
        
        .hint-icon {
            color: #00ff00; font-size: 26px; font-weight: 900;
            text-shadow: 1px 1px 0px #004400, -1px -1px 0px #004400, 1px -1px 0px #004400, -1px 1px 0px #004400, 2px 2px 2px rgba(0,0,0,0.8);
            line-height: 1; margin-top: -2px;
        }

        /* --- PAUSE MENU --- */
        #pause-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: none;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }

        .sidebar {
            position: absolute; top: 0; left: 0; width: 350px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
            padding: 50px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        .menu-logo { max-width: 200px; margin-bottom: 50px; }

        .menu-items { display: flex; flex-direction: column; gap: 6px; }
        
        .menu-btn {
            background: none; border: none; color: white;
            font-family: Tahoma, Arial, sans-serif; font-size: 18px; font-weight: bold;
            text-align: left; cursor: pointer; padding: 4px 8px; width: fit-content;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transition: background 0.1s, color 0.1s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .menu-spacer { height: 15px; }

        /* --- SUB-MENU (WHITE BOX) --- */
        #sub-menu-overlay {
            position: absolute; top: 100px; left: 400px; right: 100px; bottom: 100px;
            background: white; box-shadow: 0px 5px 15px rgba(0,0,0,0.5);
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .sub-menu-text { font-size: 24px; color: #777; font-weight: bold; }
        .sub-menu-back {
            position: absolute; bottom: 30px; right: 40px;
            background: none; border: none; font-size: 20px; font-weight: bold; color: #333;
            cursor: pointer; font-family: Tahoma, Arial, sans-serif;
        }
        .sub-menu-back:hover { text-decoration: underline; }

        #disconnect-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 99999; display: none;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="center-stage">
            <img src="Garry's_Mod_logo.svg.png" class="gmod-logo" alt="Loading Logo">
            <div class="notepad-spinner">
                <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
            </div>
        </div>
        <div class="loading-hud">
            <div class="status-text" id="status-text">Beginning Lua...</div>
            <div class="bar-container" id="progress-bar"></div>
        </div>
    </div>

    <div id="pause-menu">
        <div class="sidebar">
            <img src="GmodLOGO.png" class="menu-logo" alt="Gmod Menu Logo">
            <div class="menu-items">
                <button class="menu-btn" id="btn-resume">Resume Game</button>
                <div class="menu-spacer"></div>
                <button class="menu-btn">Start New Game</button>
                <button class="menu-btn">Find Multiplayer Game</button>
                <div class="menu-spacer"></div>
                <button class="menu-btn sub-trigger" data-type="addons">Addons</button>
                <button class="menu-btn sub-trigger" data-type="demos">Demos</button>
                <button class="menu-btn sub-trigger" data-type="saves">Saves</button>
                <div class="menu-spacer"></div>
                <button class="menu-btn">Options</button>
                <div class="menu-spacer"></div>
                <button class="menu-btn" id="btn-disconnect">Disconnect</button>
                <button class="menu-btn" id="btn-quit">Quit</button>
            </div>
        </div>

        <div id="sub-menu-overlay">
            <div class="sub-menu-text" id="sub-menu-message">No addons found!</div>
            <button class="sub-menu-back" id="btn-back">Back</button>
        </div>
    </div>

    <div id="disconnect-flash"></div>

    <img src="Newtonvm.webp" id="viewmodel" alt="Weapon Viewmodel">

    <div id="hint-container">
        <div class="gmod-hint" id="hint-1"><span class="hint-icon">?</span><span>Hold 'q' to open the SPAWN MENU</span></div>
        <div class="gmod-hint" id="hint-2"><span class="hint-icon">?</span><span>You can turn off hints in the CONTEXT MENU</span></div>
    </div>

    <div id="game-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        const hintSound = new Audio('balloon_pop_cute.wav');
        let engineFrozen = false; 
        let isPaused = false;

        // --- UI & PAUSE MENU LOGIC ---
        const pauseMenu = document.getElementById('pause-menu');
        const subMenuOverlay = document.getElementById('sub-menu-overlay');
        const subMenuMessage = document.getElementById('sub-menu-message');

        document.getElementById('btn-resume').addEventListener('click', () => {
            controls.lock(); 
        });

        document.querySelectorAll('.sub-trigger').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.target.getAttribute('data-type');
                subMenuMessage.innerText = `No ${type} found!`;
                subMenuOverlay.style.display = 'flex';
            });
        });

        document.getElementById('btn-back').addEventListener('click', () => {
            subMenuOverlay.style.display = 'none';
        });

        document.getElementById('btn-disconnect').addEventListener('click', () => {
            document.getElementById('disconnect-flash').style.display = 'block';
            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 800);
        });

        document.getElementById('btn-quit').addEventListener('click', () => {
            window.close(); 
        });


        // --- LOADING LOGIC ---
        const totalBlocks = 20;
        const progressBar = document.getElementById('progress-bar');
        for (let i = 0; i < totalBlocks; i++) {
            const block = document.createElement('div');
            block.className = 'bar-block';
            progressBar.appendChild(block);
        }

        const blocks = document.querySelectorAll('.bar-block');
        const statusText = document.getElementById('status-text');
        let currentBlock = 0;

        const loadingInterval = setInterval(() => {
            if (currentBlock < totalBlocks) {
                blocks[currentBlock].classList.add('filled');
                currentBlock++;
                const progress = currentBlock / totalBlocks;
                if (progress > 0.3 && progress < 0.8) statusText.innerText = "Loading Lua...";
                else if (progress >= 0.8) statusText.innerText = "Lua started...";
            } else {
                clearInterval(loadingInterval);
                document.getElementById('loading-overlay').style.display = 'none';
                
                engineFrozen = true; 
                
                setTimeout(() => {
                    engineFrozen = false;
                    document.getElementById('viewmodel').style.display = 'block';

                    setTimeout(() => {
                        const hint1 = document.getElementById('hint-1');
                        hint1.classList.add('show');
                        hintSound.play().catch(e => {});
                        setTimeout(() => hint1.classList.remove('show'), 10000); 
                        
                        setTimeout(() => {
                            const hint2 = document.getElementById('hint-2');
                            hint2.classList.add('show');
                            hintSound.currentTime = 0; 
                            hintSound.play().catch(e => {});
                            setTimeout(() => hint2.classList.remove('show'), 10000); 
                        }, 2000); 
                    }, 5000); 
                }, 1000); 
            }
        }, 10000 / totalBlocks);

        // --- 3D ENGINE & MOVEMENT LOGIC ---
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isSprinting = false, isCrouching = false, canJump = false;
        
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        let playerBaseY = 0; 
        let cameraOffset = 10; 
        const gravity = 40.0;
        const jumpForce = 20.0;

        const viewmodel = document.getElementById('viewmodel');
        let bobTime = 0;
        let currentBobX = 0, currentBobY = 0;
        
        let targetSwayX = 0, targetSwayY = 0;
        let currentSwayX = 0, currentSwayY = 0;
        let landDip = 0; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            light.position.set(0, 200, 0);
            scene.add(light);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 200, 100);
            scene.add(dirLight);

            // Create flat grass terrain using repeating texture
            const textureLoader = new THREE.TextureLoader();
            const grassTexture = textureLoader.load('grass01.jpg');
            grassTexture.wrapS = THREE.RepeatWrapping;
            grassTexture.wrapT = THREE.RepeatWrapping;
            grassTexture.repeat.set(100, 100); // 100x100 tiles over 2000x2000 plane

            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeometry.rotateX(-Math.PI / 2);
            const floorMaterial = new THREE.MeshStandardMaterial({ map: grassTexture, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            scene.add(floor);

            const gridHelper = new THREE.GridHelper(2000, 200, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.2;
            gridHelper.material.transparent = true;
            gridHelper.position.y = 0.1; 
            scene.add(gridHelper);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            
            controls.addEventListener('unlock', function () {
                if (!engineFrozen && document.getElementById('loading-overlay').style.display === 'none') {
                    pauseMenu.style.display = 'block';
                    isPaused = true;
                }
            });

            controls.addEventListener('lock', function () {
                pauseMenu.style.display = 'none';
                subMenuOverlay.style.display = 'none'; 
                isPaused = false;
            });

            document.addEventListener('click', function (e) {
                if (!isPaused && !engineFrozen && document.getElementById('loading-overlay').style.display === 'none') {
                    controls.lock();
                }
            });

            document.addEventListener('mousemove', function(event) {
                if (controls.isLocked) {
                    targetSwayX -= event.movementX * 0.15; 
                    targetSwayY += event.movementY * 0.15; 
                    
                    targetSwayX = Math.max(-25, Math.min(25, targetSwayX));
                    targetSwayY = Math.max(-20, Math.min(30, targetSwayY));
                }
            });

            scene.add(controls.getObject());

            const onKeyDown = function (event) {
                if (isPaused) return;
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                    case 'Space': 
                        if (canJump) { velocity.y += jumpForce; canJump = false; } 
                        break;
                    case 'ShiftLeft': isSprinting = true; break;
                    case 'ControlLeft': case 'KeyC': isCrouching = true; break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isSprinting = false; break;
                    case 'ControlLeft': case 'KeyC': isCrouching = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (engineFrozen) return; 

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked === true && !isPaused) {
                const friction = canJump ? 10.0 : 1.5; 
                velocity.x -= velocity.x * friction * delta;
                velocity.z -= velocity.z * friction * delta;
                
                velocity.y -= gravity * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                let speed = 400.0; 
                if (isCrouching) speed = 150.0;
                else if (isSprinting) speed = 750.0;

                const controlMult = canJump ? 1.0 : 0.2; 
                
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * controlMult * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * controlMult * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                const wasInAir = !canJump;
                playerBaseY += velocity.y * delta;
                
                if (playerBaseY < 0) { 
                    playerBaseY = 0;
                    if (wasInAir && velocity.y < -15) {
                        landDip = Math.min(80, Math.abs(velocity.y) * 1.5); 
                    }
                    velocity.y = 0;
                    canJump = true;
                }

                const targetOffset = isCrouching ? 5 : 10;
                cameraOffset += (targetOffset - cameraOffset) * 12 * delta;
                controls.getObject().position.y = playerBaseY + cameraOffset;

                // --- VIEWMODEL PHYSICS ---
                const movementSpeed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
                let targetBobX = 0, targetBobY = 0;

                if (movementSpeed > 10 && canJump) {
                    const bobSpeed = isSprinting ? 14 : 9;
                    bobTime += delta * bobSpeed; 
                    targetBobX = Math.sin(bobTime) * (isSprinting ? 15 : 10);
                    targetBobY = Math.abs(Math.cos(bobTime)) * (isSprinting ? 12 : 8);
                } else {
                    bobTime += delta * 2; 
                    targetBobX = Math.sin(bobTime) * 2;
                    targetBobY = Math.sin(bobTime * 2) * 2;
                }

                currentBobX += (targetBobX - currentBobX) * 8 * delta;
                currentBobY += (targetBobY - currentBobY) * 8 * delta;

                targetSwayX += (0 - targetSwayX) * 8 * delta;
                targetSwayY += (0 - targetSwayY) * 8 * delta;
                
                currentSwayX += (targetSwayX - currentSwayX) * 15 * delta;
                currentSwayY += (targetSwayY - currentSwayY) * 15 * delta;

                const moveDragZ = (velocity.z * 0.05); 
                const moveDragX = (velocity.x * 0.05);

                landDip += (0 - landDip) * 10 * delta; 

                const finalX = currentBobX + currentSwayX + moveDragX;
                const finalY = currentBobY + currentSwayY + landDip;
                
                const finalRotation = currentSwayX * 0.03; 

                viewmodel.style.transform = `translate(${finalX}px, ${finalY}px) rotate(${finalRotation}deg)`;
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
