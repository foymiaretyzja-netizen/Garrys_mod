<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garry's Mod - gm_baseplate</title>
    <style>
        /* --- CORE STYLING --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Tahoma, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(to bottom, #4a90e2 0%, #a0cbf1 50%, #e0ecef 100%);
            user-select: none;
        }

        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; cursor: crosshair; }

        /* --- LOADING SCREEN OVERLAY --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #dce4eb 0%, #a4b2c1 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; 
        }

        .center-stage { display: flex; flex-direction: column; align-items: center; transform: translateY(-20px); }
        .gmod-logo { max-width: 250px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); margin-bottom: 25px; }

        .notepad-spinner {
            width: 32px; height: 32px; background-color: #ffda47;
            border: 1px solid #c9a826; border-radius: 2px; position: relative;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.15);
            animation: flipNotepad 1.8s infinite linear;
        }
        .eye { position: absolute; width: 5px; height: 5px; background: #333; border-radius: 50%; top: 8px; }
        .eye.left { left: 6px; } .eye.right { right: 6px; }
        .mouth { position: absolute; width: 14px; height: 3px; background: #333; bottom: 8px; left: 8px; border-radius: 0 0 10px 10px; }
        @keyframes flipNotepad { 0% { transform: perspective(400px) rotateY(0deg); } 100% { transform: perspective(400px) rotateY(360deg); } }

        .loading-hud { position: absolute; bottom: 40px; right: 50px; display: flex; flex-direction: column; align-items: flex-end; }
        .status-text { color: #333; font-size: 13px; font-weight: bold; margin-bottom: 6px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .bar-container { display: flex; gap: 2px; padding: 2px; background-color: #666; width: 280px; height: 16px; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); }
        .bar-block { flex: 1; background-color: transparent; }
        .bar-block.filled { background-color: #f2f2f2; }

        /* --- 2D VIEWMODEL --- */
        @keyframes pulseGlow {
            0% { filter: drop-shadow(0px 0px 3px rgba(0, 150, 255, 0.15)); }
            50% { filter: drop-shadow(0px 0px 10px rgba(0, 150, 255, 0.4)); }
            100% { filter: drop-shadow(0px 0px 3px rgba(0, 150, 255, 0.15)); }
        }

        #viewmodel {
            position: absolute; 
            bottom: -50px; right: -50px; 
            width: 45%; max-width: 600px; 
            z-index: 5; pointer-events: none; 
            transform-origin: bottom right;
            display: none; 
            animation: pulseGlow 4s infinite ease-in-out;
        }

        /* --- HEALTH HUD & DAMAGE OVERLAYS --- */
        #health-hud {
            position: absolute; bottom: 35px; left: 35px;
            background: rgba(0, 0, 0, 0.65); padding: 8px 18px; border-radius: 4px;
            display: none; align-items: baseline; gap: 12px;
            color: #ffcc00; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            z-index: 50; pointer-events: none; box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }
        .health-label { font-size: 14px; font-weight: bold; }
        .health-value { font-size: 42px; font-weight: bold; line-height: 1; }

        #damage-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.4); z-index: 800;
            pointer-events: none; opacity: 0; transition: opacity 0.1s ease-out;
        }

        #death-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(150, 0, 0, 0.45); z-index: 800;
            pointer-events: none; display: none;
        }

        /* --- NOTIFICATIONS (UNDO) --- */
        #notification-container {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 5px; z-index: 100; pointer-events: none;
        }
        .noti-box {
            background: rgba(0, 0, 0, 0.6); color: white;
            padding: 8px 12px; border-radius: 4px; font-size: 14px; font-weight: bold;
            opacity: 1; transition: opacity 0.5s ease;
        }
        .noti-arrow { color: #00bfff; font-size: 16px; margin-right: 5px; }

        /* --- GMOD HINTS SYSTEM --- */
        #hint-container {
            position: absolute; right: 20px; bottom: 30%; 
            display: flex; flex-direction: column; gap: 8px; z-index: 50; pointer-events: none; 
        }
        .gmod-hint {
            background: rgba(0, 0, 0, 0.65); color: white; font-size: 14px; font-weight: bold;
            padding: 6px 15px 6px 10px; display: flex; align-items: center; gap: 12px;
            text-shadow: 1px 1px 0px black; border-radius: 2px;
            opacity: 0; transform: translateY(20px) scale(0.95);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gmod-hint.show { opacity: 1; transform: translateY(0) scale(1); }
        .hint-icon {
            color: #00ff00; font-size: 26px; font-weight: 900;
            text-shadow: 1px 1px 0px #004400, -1px -1px 0px #004400, 1px -1px 0px #004400, -1px 1px 0px #004400, 2px 2px 2px rgba(0,0,0,0.8);
            line-height: 1; margin-top: -2px;
        }

        /* --- Q-MENU (SPAWN MENU) --- */
        #spawn-menu {
            position: fixed; top: 10%; left: 10%; width: 80%; height: 80%;
            background: rgba(180, 180, 180, 0.95); border: 2px solid #555;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5); z-index: 900; display: none;
            flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .spawn-header { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 20px; border-bottom: 2px solid #999; padding-bottom: 5px; }
        .spawn-category { font-size: 18px; font-weight: bold; color: #555; margin-top: 15px; margin-bottom: 10px; }
        .spawn-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .spawn-btn {
            width: 100px; height: 100px; background: #e0e0e0; border: 1px solid #aaa;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            font-weight: bold; color: #333; font-size: 14px; text-shadow: 1px 1px 0px white;
            transition: background 0.1s; border-radius: 4px;
        }
        .spawn-btn:hover { background: #fff; border-color: #00aaff; box-shadow: 0px 0px 5px rgba(0, 170, 255, 0.5); }
        .spawn-btn.npc { background: #ffcccc; border-color: #ff0000; }
        .spawn-btn.npc:hover { background: #ffaaaa; }

        /* --- PAUSE MENU --- */
        #pause-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: none; background: rgba(0,0,0,0.2); backdrop-filter: blur(2px);
        }
        .sidebar {
            position: absolute; top: 0; left: 0; width: 350px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
            padding: 50px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        .menu-logo { max-width: 200px; margin-bottom: 50px; }
        .menu-items { display: flex; flex-direction: column; gap: 6px; }
        .menu-btn {
            background: none; border: none; color: white;
            font-family: Tahoma, Arial, sans-serif; font-size: 18px; font-weight: bold;
            text-align: left; cursor: pointer; padding: 4px 8px; width: fit-content;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); transition: background 0.1s, color 0.1s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .menu-spacer { height: 15px; }
        #disconnect-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99999; display: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="center-stage">
            <img src="Garry's_Mod_logo.svg.png" class="gmod-logo" alt="Loading Logo">
            <div class="notepad-spinner">
                <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
            </div>
        </div>
        <div class="loading-hud">
            <div class="status-text" id="status-text">Beginning Lua...</div>
            <div class="bar-container" id="progress-bar"></div>
        </div>
    </div>

    <div id="spawn-menu">
        <div class="spawn-header">Spawnlists</div>
        
        <div class="spawn-category">Basic Props</div>
        <div class="spawn-grid">
            <button class="spawn-btn" onclick="spawnEntity('Square')">Square</button>
            <button class="spawn-btn" onclick="spawnEntity('Ball')">Ball</button>
            <button class="spawn-btn" onclick="spawnEntity('Triangle')">Triangle</button>
        </div>

        <div class="spawn-category">Entities / NPCs</div>
        <div class="spawn-grid">
            <button class="spawn-btn npc" onclick="spawnEntity('Nextbot')">Nextbot</button>
        </div>
    </div>

    <div id="pause-menu">
        <div class="sidebar">
            <img src="GmodLOGO.png" class="menu-logo" alt="Gmod Menu Logo">
            <div class="menu-items">
                <button class="menu-btn" id="btn-resume">Resume Game</button>
                <div class="menu-spacer"></div>
                <button class="menu-btn" id="btn-disconnect">Disconnect</button>
                <button class="menu-btn" id="btn-quit">Quit</button>
            </div>
        </div>
    </div>

    <div id="disconnect-flash"></div>
    <div id="damage-flash"></div>
    <div id="death-overlay"></div>
    <div id="notification-container"></div>

    <img src="Newtonvm.webp" id="viewmodel" alt="Weapon Viewmodel">

    <div id="health-hud">
        <span class="health-label">HEALTH</span>
        <span class="health-value" id="health-display">100</span>
    </div>

    <div id="hint-container">
        <div class="gmod-hint" id="hint-1"><span class="hint-icon">?</span><span>Hold 'Q' to open the SPAWN MENU</span></div>
        <div class="gmod-hint" id="hint-2"><span class="hint-icon">?</span><span>Press 'Z' to Undo / Remove Objects</span></div>
    </div>

    <div id="game-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        const hintSound = new Audio('balloon_pop_cute.wav'); // Replace if needed
        let engineFrozen = false; 
        let isPaused = false;
        let isSpawnMenuOpen = false;

        // --- HEALTH & DEATH SYSTEM ---
        let playerHealth = 100;
        let isDead = false;
        const healthDisplay = document.getElementById('health-display');
        const damageFlash = document.getElementById('damage-flash');
        const deathOverlay = document.getElementById('death-overlay');
        const viewmodelImg = document.getElementById('viewmodel');

        function applyDamage(amount) {
            if (isNoclipping || isDead) return; 
            playerHealth -= Math.floor(amount);
            if (playerHealth < 0) playerHealth = 0;
            
            damageFlash.style.opacity = '1';
            setTimeout(() => { damageFlash.style.opacity = '0'; }, 150);
            healthDisplay.innerText = playerHealth;

            if (playerHealth <= 0) triggerDeath();
        }

        function triggerDeath() {
            isDead = true;
            viewmodelImg.style.display = 'none';
            deathOverlay.style.display = 'block';

            setTimeout(() => {
                isDead = false; playerHealth = 100; healthDisplay.innerText = playerHealth;
                deathOverlay.style.display = 'none'; viewmodelImg.style.display = 'block';
                controls.getObject().position.set(0, 10, 0); velocity.set(0,0,0);
                camera.rotation.z = 0; cameraOffset = 10;
            }, 3500);
        }

        // --- UI & MENUS ---
        const pauseMenu = document.getElementById('pause-menu');
        const spawnMenu = document.getElementById('spawn-menu');

        document.getElementById('btn-resume').addEventListener('click', () => controls.lock());
        document.getElementById('btn-disconnect').addEventListener('click', () => {
            document.getElementById('disconnect-flash').style.display = 'block';
            setTimeout(() => window.location.href = 'index.html', 800);
        });
        document.getElementById('btn-quit').addEventListener('click', () => window.close());

        // --- LOADING LOGIC ---
        const totalBlocks = 20;
        const progressBar = document.getElementById('progress-bar');
        for (let i = 0; i < totalBlocks; i++) {
            const block = document.createElement('div');
            block.className = 'bar-block';
            progressBar.appendChild(block);
        }
        const blocks = document.querySelectorAll('.bar-block');
        const statusText = document.getElementById('status-text');
        let currentBlock = 0;

        const loadingInterval = setInterval(() => {
            if (currentBlock < totalBlocks) {
                blocks[currentBlock].classList.add('filled'); currentBlock++;
                const progress = currentBlock / totalBlocks;
                if (progress > 0.3 && progress < 0.8) statusText.innerText = "Loading Lua...";
                else if (progress >= 0.8) statusText.innerText = "Lua started...";
            } else {
                clearInterval(loadingInterval);
                document.getElementById('loading-overlay').style.display = 'none';
                engineFrozen = true; 
                
                setTimeout(() => {
                    engineFrozen = false; viewmodelImg.style.display = 'block';
                    document.getElementById('health-hud').style.display = 'flex'; 

                    setTimeout(() => {
                        const hint1 = document.getElementById('hint-1'); hint1.classList.add('show');
                        hintSound.play().catch(e => {}); setTimeout(() => hint1.classList.remove('show'), 8000); 
                        
                        setTimeout(() => {
                            const hint2 = document.getElementById('hint-2'); hint2.classList.add('show');
                            hintSound.currentTime = 0; hintSound.play().catch(e => {});
                            setTimeout(() => hint2.classList.remove('show'), 8000); 
                        }, 2000); 
                    }, 5000); 
                }, 1000); 
            }
        }, 10000 / totalBlocks);

        // --- 3D ENGINE, MOVEMENT, & SPAWNING ---
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isSprinting = false, isCrouching = false, canJump = false, jumpPressed = false;
        let isNoclipping = false; 
        
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        let playerBaseY = 0; let cameraOffset = 10; 
        const gravity = 40.0; const jumpForce = 20.0;

        let bobTime = 0; let currentBobX = 0, currentBobY = 0;
        let targetSwayX = 0, targetSwayY = 0; let currentSwayX = 0, currentSwayY = 0; let landDip = 0; 

        // Spawning System Variables
        const spawnedObjects = [];
        const notiContainer = document.getElementById('notification-container');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1); light.position.set(0, 200, 0); scene.add(light);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(0, 200, 100); scene.add(dirLight);

            const textureLoader = new THREE.TextureLoader();
            const grassTexture = textureLoader.load('grass01.jpg');
            grassTexture.wrapS = THREE.RepeatWrapping; grassTexture.wrapT = THREE.RepeatWrapping; grassTexture.repeat.set(100, 100); 

            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100); floorGeometry.rotateX(-Math.PI / 2);
            const floorMaterial = new THREE.MeshStandardMaterial({ map: grassTexture, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial); scene.add(floor);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            
            controls.addEventListener('unlock', function () {
                if (!engineFrozen && document.getElementById('loading-overlay').style.display === 'none') {
                    if (isSpawnMenuOpen) {
                        spawnMenu.style.display = 'flex';
                    } else {
                        pauseMenu.style.display = 'block';
                        isPaused = true;
                    }
                }
            });

            controls.addEventListener('lock', function () {
                pauseMenu.style.display = 'none';
                spawnMenu.style.display = 'none';
                isPaused = false;
                isSpawnMenuOpen = false;
            });

            document.addEventListener('click', function (e) {
                // If they click on the canvas and menus are hidden, lock pointer
                if (!isPaused && !isSpawnMenuOpen && !engineFrozen && document.getElementById('loading-overlay').style.display === 'none' && !isDead) {
                    controls.lock();
                }
            });

            document.addEventListener('mousemove', function(event) {
                if (controls.isLocked && !isDead) {
                    targetSwayX -= event.movementX * 0.15; targetSwayY += event.movementY * 0.15; 
                    targetSwayX = Math.max(-25, Math.min(25, targetSwayX)); targetSwayY = Math.max(-20, Math.min(30, targetSwayY));
                }
            });

            scene.add(controls.getObject());

            const onKeyDown = function (event) {
                if (isDead) return;

                // Toggle Spawn Menu
                if (event.code === 'KeyQ' && !isPaused) {
                    if (isSpawnMenuOpen) {
                        controls.lock(); // Re-lock screen, closes menu automatically via event
                    } else if (controls.isLocked) {
                        isSpawnMenuOpen = true;
                        controls.unlock(); // Unlocks screen, opens menu automatically via event
                    }
                }

                // Undo Object
                if (event.code === 'KeyZ' && controls.isLocked) {
                    undoLastSpawn();
                }

                if (isPaused || isSpawnMenuOpen) return;
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                    case 'Space': jumpPressed = true; if (canJump && !isNoclipping) { velocity.y += jumpForce; canJump = false; } break;
                    case 'ShiftLeft': isSprinting = true; break;
                    case 'ControlLeft': case 'KeyC': isCrouching = true; break;
                    case 'KeyV': isNoclipping = !isNoclipping; if(isNoclipping) velocity.set(0,0,0); break;
                }
            };
            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isSprinting = false; break;
                    case 'ControlLeft': case 'KeyC': isCrouching = false; break;
                    case 'Space': jumpPressed = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        // --- SPAWNING LOGIC ---
        window.spawnEntity = function(type) {
            let geometry, material, mesh;

            switch(type) {
                case 'Square':
                    geometry = new THREE.BoxGeometry(5, 5, 5);
                    material = new THREE.MeshStandardMaterial({ color: 0x4287f5 });
                    break;
                case 'Ball':
                    geometry = new THREE.SphereGeometry(3, 32, 32);
                    material = new THREE.MeshStandardMaterial({ color: 0xf54242 });
                    break;
                case 'Triangle':
                    geometry = new THREE.ConeGeometry(3, 6, 4);
                    material = new THREE.MeshStandardMaterial({ color: 0x42f563 });
                    break;
                case 'Nextbot':
                    geometry = new THREE.PlaneGeometry(12, 12);
                    material = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
                    break;
            }

            mesh = new THREE.Mesh(geometry, material);
            mesh.name = type;
            if (type === 'Nextbot') mesh.isNextbot = true;

            // Spawn directly in front of camera
            const spawnDist = 20;
            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            mesh.position.copy(controls.getObject().position).add(camDir.multiplyScalar(spawnDist));
            
            // Adjust height so it doesn't clip into floor
            if (mesh.position.y < 3) mesh.position.y = 3;

            scene.add(mesh);
            spawnedObjects.push(mesh);
        };

        window.undoLastSpawn = function() {
            if (spawnedObjects.length > 0) {
                const obj = spawnedObjects.pop();
                scene.remove(obj);
                
                // Show UI Notification
                const noti = document.createElement('div');
                noti.className = 'noti-box';
                noti.innerHTML = `<span class="noti-arrow">↩</span> Deleted ${obj.name}.`;
                notiContainer.appendChild(noti);
                
                setTimeout(() => { noti.style.opacity = '0'; setTimeout(() => noti.remove(), 500); }, 3000);
            }
        };

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (engineFrozen) return; 

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            // --- NEXTBOT AI LOGIC ---
            const playerPos = controls.getObject().position;
            spawnedObjects.forEach(obj => {
                if (obj.isNextbot) {
                    // Billboard effect (always face player camera)
                    obj.quaternion.copy(camera.quaternion);
                    
                    // Chase logic (700 speed = roughly sprint speed)
                    if (!isDead) {
                        const botSpeed = 700 * delta;
                        const direction = new THREE.Vector3().subVectors(playerPos, obj.position);
                        direction.y = 0; // Keep it sliding along the ground
                        direction.normalize();
                        obj.position.addScaledVector(direction, botSpeed);
                    }
                }
            });

            if (controls.isLocked === true && !isPaused && !isSpawnMenuOpen) {
                if (isDead) {
                    cameraOffset += (2 - cameraOffset) * 5 * delta; 
                    camera.rotation.z += (Math.PI / 2.2 - camera.rotation.z) * 4 * delta; 
                    controls.getObject().position.y = playerBaseY + cameraOffset;
                    velocity.x -= velocity.x * 5.0 * delta; velocity.z -= velocity.z * 5.0 * delta;
                    controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);
                } else if (isNoclipping) {
                    const noclipSpeed = isSprinting ? 500 : 200;
                    const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                    if (moveForward) controls.getObject().position.addScaledVector(camDir, noclipSpeed * delta);
                    if (moveBackward) controls.getObject().position.addScaledVector(camDir, -noclipSpeed * delta);
                    if (moveLeft) controls.moveRight(-noclipSpeed * delta);
                    if (moveRight) controls.moveRight(noclipSpeed * delta);
                    if (jumpPressed) controls.getObject().position.y += noclipSpeed * delta;
                    if (isCrouching) controls.getObject().position.y -= noclipSpeed * delta;
                    playerBaseY = controls.getObject().position.y - cameraOffset; velocity.set(0, 0, 0); 
                } else {
                    const friction = canJump ? 10.0 : 1.5; 
                    velocity.x -= velocity.x * friction * delta; velocity.z -= velocity.z * friction * delta; velocity.y -= gravity * delta;
                    direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft); direction.normalize(); 
                    let speed = 400.0; if (isCrouching) speed = 150.0; else if (isSprinting) speed = 750.0;
                    const controlMult = canJump ? 1.0 : 0.2; 
                    if (moveForward || moveBackward) velocity.z -= direction.z * speed * controlMult * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * speed * controlMult * delta;
                    controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);
                    
                    const wasInAir = !canJump; playerBaseY += velocity.y * delta;
                    if (playerBaseY < 0) { 
                        playerBaseY = 0;
                        if (wasInAir) {
                            if (velocity.y < -45) applyDamage((Math.abs(velocity.y) - 45) * 1.8);
                            landDip = Math.min(80, Math.abs(velocity.y) * 1.5); 
                        }
                        velocity.y = 0; canJump = true;
                    }
                    const targetOffset = isCrouching ? 5 : 10;
                    cameraOffset += (targetOffset - cameraOffset) * 12 * delta; controls.getObject().position.y = playerBaseY + cameraOffset;
                }

                if (!isDead) {
                    const movementSpeed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
                    let targetBobX = 0, targetBobY = 0;
                    if (movementSpeed > 10 && canJump && !isNoclipping) {
                        const bobSpeed = isSprinting ? 14 : 9; bobTime += delta * bobSpeed; 
                        targetBobX = Math.sin(bobTime) * (isSprinting ? 15 : 10); targetBobY = Math.abs(Math.cos(bobTime)) * (isSprinting ? 12 : 8);
                    } else {
                        bobTime += delta * 2; targetBobX = Math.sin(bobTime) * 2; targetBobY = Math.sin(bobTime * 2) * 2;
                    }
                    currentBobX += (targetBobX - currentBobX) * 8 * delta; currentBobY += (targetBobY - currentBobY) * 8 * delta;
                    targetSwayX += (0 - targetSwayX) * 8 * delta; targetSwayY += (0 - targetSwayY) * 8 * delta;
                    currentSwayX += (targetSwayX - currentSwayX) * 15 * delta; currentSwayY += (targetSwayY - currentSwayY) * 15 * delta;
                    const moveDragZ = (velocity.z * 0.05); const moveDragX = (velocity.x * 0.05); landDip += (0 - landDip) * 10 * delta; 
                    const finalX = currentBobX + currentSwayX + moveDragX; const finalY = currentBobY + currentSwayY + landDip;
                    const finalRotation = currentSwayX * 0.03; 
                    viewmodelImg.style.transform = `translate(${finalX}px, ${finalY}px) rotate(${finalRotation}deg)`;
                }
            }
            prevTime = time; renderer.render(scene, camera);
        }
    </script>
